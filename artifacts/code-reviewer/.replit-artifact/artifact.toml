kind = "web"
previewPath = "/"
title = "AI Code Reviewer"
version = "1.0.0"
id = "artifacts/code-reviewer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18860
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/code-reviewer run dev"

[services.env]
PORT = "18860"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/code-reviewer", "run", "build"]
publicDir = "artifacts/code-reviewer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
